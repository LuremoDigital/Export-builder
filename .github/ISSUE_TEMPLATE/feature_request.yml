name: Feature request
description: Suggest an idea or improvement for Export Builder
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. The plugin aims to stay a focused export workflow, so the clearer the use case, the better we can judge fit.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched [existing issues](https://github.com/LuremoDigital/Export-builder/issues?q=is%3Aissue) and this has not already been requested.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or the pain point, not just the feature. What are you trying to export, and what gets in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you currently use, or other approaches you weighed.
    validations:
      required: false
  - type: dropdown
    id: edition
    attributes:
      label: Which edition does this relate to?
      options:
        - Standard
        - Pro
        - Either / not sure
    validations:
      required: false
